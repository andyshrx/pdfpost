services:
  app:
    build: .
    image: ghcr.io/andyshrx/pdfpost:latest
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      AUTORUN_ENABLED: "true" # run migrations on boot
      PHP_OPCACHE_ENABLE: "1"
      PDFPOST_GOTENBERG_URL: http://gotenberg:3000
      # keep the sqlite file inside the storage volume, never mount over code
      DB_DATABASE: /var/www/html/storage/app/database.sqlite
    volumes:
      # mounted so key:generate can write to it and all services share it
      - ./.env:/var/www/html/.env
      - pdfpost-storage:/var/www/html/storage/app
    depends_on:
      - gotenberg
    networks:
      - default
      - render

  worker:
    image: ghcr.io/andyshrx/pdfpost:latest
    command: ["php", "/var/www/html/artisan", "queue:work", "--tries=3", "--max-time=3600"]
    env_file: .env
    environment:
      PHP_OPCACHE_ENABLE: "1"
      PDFPOST_GOTENBERG_URL: http://gotenberg:3000
      DB_DATABASE: /var/www/html/storage/app/database.sqlite
    volumes:
      - ./.env:/var/www/html/.env
      - pdfpost-storage:/var/www/html/storage/app
    depends_on:
      - app
      - gotenberg
    networks:
      - default
      - render

  scheduler:
    image: ghcr.io/andyshrx/pdfpost:latest
    command: ["php", "/var/www/html/artisan", "schedule:work"]
    env_file: .env
    environment:
      DB_DATABASE: /var/www/html/storage/app/database.sqlite
    volumes:
      - ./.env:/var/www/html/.env
      - pdfpost-storage:/var/www/html/storage/app
    depends_on:
      - app

  # chromium stays on an internal network with no way out to the internet,
  # so user templates cannot be used to reach other services (ssrf)
  gotenberg:
    image: gotenberg/gotenberg:8
    networks:
      - render

networks:
  render:
    internal: true

volumes:
  pdfpost-storage:
